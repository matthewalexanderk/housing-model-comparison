<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Quest</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Python Quest</h1>
        <p class="tagline">Level up your Python skills through interactive quests.</p>
        <div class="stats">
          <div><span id="levels-complete">0</span>/<span id="levels-total">0</span> levels complete</div>
          <div><span id="xp-total">0</span> XP earned</div>
        </div>
        <nav>
          <ul id="level-list"></ul>
        </nav>
      </aside>
      <main class="content">
        <header class="level-header">
          <div>
            <h2 id="level-title">Loading...</h2>
            <span id="level-category" class="category-pill"></span>
          </div>
          <span id="level-xp" class="xp-pill"></span>
        </header>
        <p id="level-prompt" class="prompt"></p>
        <section class="docs">
          <h3>Official Python Docs</h3>
          <ul id="level-docs"></ul>
        </section>
        <section class="hints">
          <h3>Hints</h3>
          <ul id="level-hints"></ul>
        </section>
        <section class="editor">
          <textarea id="code-editor" spellcheck="false"></textarea>
          <div class="actions">
            <button id="run-button">Run Level</button>
            <button id="next-button" class="secondary">Next Level</button>
          </div>
        </section>
        <section class="output">
          <div class="output-header">
            <h3>Output</h3>
            <span class="hint">Run your code to see feedback.</span>
          </div>
          <pre id="stdout"></pre>
          <div id="messages" class="messages"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
